{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block content %}
<div class="analytics-page">
    <div class="coming-soon-card">
        <div class="cs-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </div>

        <span class="cs-badge">Coming Soon</span>

        <h2 class="cs-heading">Advanced Analytics</h2>

        <p class="cs-description">
            We're working on powerful insights and visualizations to help you understand your spending patterns better.
        </p>

        <div class="cs-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <p class="cs-tagline">We're crafting something special</p>
    </div>
</div>
{% endblock %}
